<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Agent as a Directory</title>
  <meta name="robots" content="noindex">
  <style>
    body{margin:0;font:17px/1.55 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#fbfaf7;color:#171717;display:grid;min-height:100vh;place-items:center;padding:24px}main{max-width:680px;background:#fff;border:1px solid #ded8cb;border-radius:16px;padding:24px;box-shadow:0 1px 0 rgba(0,0,0,.04)}a{color:#2454a6}
  </style>
</head>
<body>
<main>
  <h1>The Agent as a Directory</h1>
  <p>Loading the report…</p>
  <p><a href="../">Open the report</a></p>
</main>
<script>
(async function(){
  try {
    const response = await fetch('../index.html', { cache: 'no-cache' });
    if (!response.ok) throw new Error('Could not load report');
    const html = await response.text();
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.querySelector('p').textContent = 'Could not load the report automatically.';
  }
})();
</script>
</body>
</html>
